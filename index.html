<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>정확한 길이 맞추기 대결</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; overflow-x: hidden; }
        input[type="range"] { cursor: pointer; }
        .animate-pulse-slow { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        .music-rotating { animation: spin 4s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const LucideIcon = ({ name, size = 24, className = "" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); });
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        const App = () => {
            // --- [상태 관리] ---
            const [gameState, setGameState] = useState('calibrate');
            const [cardWidthPx, setCardWidthPx] = useState(300); 
            const [pixelsPerCm, setPixelsPerCm] = useState(0);
            const containerRef = useRef(null);
            const [containerWidth, setContainerWidth] = useState(0);
            const [minProblemLength, setMinProblemLength] = useState(3);
            const [maxProblemLength, setMaxProblemLength] = useState(15);
            const [currentRound, setCurrentRound] = useState(1);
            const [targetLengthCm, setTargetLengthCm] = useState(0);
            const [studentGuess, setStudentGuess] = useState('');
            const [teacherGuess, setTeacherGuess] = useState('');
            const [roundResult, setRoundResult] = useState(null);
            const [gameHistory, setGameHistory] = useState([]);
            
            // [배경음악 상태]
            const [isMusicPlaying, setIsMusicPlaying] = useState(false);
            const audioRef = useRef(null);

            const CREDIT_CARD_WIDTH_CM = 8.56;
            const MAX_ROUNDS = 5;
            const maxPossibleCmOnScreen = pixelsPerCm > 0 ? Math.floor((containerWidth - 60) / pixelsPerCm) : 100;

            useEffect(() => {
                const updateWidth = () => { if (containerRef.current) setContainerWidth(containerRef.current.offsetWidth); };
                updateWidth();
                window.addEventListener('resize', updateWidth);
                return () => window.removeEventListener('resize', updateWidth);
            }, [gameState]);

            useEffect(() => { setPixelsPerCm(cardWidthPx / CREDIT_CARD_WIDTH_CM); }, [cardWidthPx]);

            // [배경음악 제어 함수]
            const toggleMusic = () => {
                if (!audioRef.current) return;
                if (isMusicPlaying) {
                    audioRef.current.pause();
                } else {
                    audioRef.current.play().catch(e => console.log("음악 재생을 위해 페이지를 먼저 클릭해주세요."));
                }
                setIsMusicPlaying(!isMusicPlaying);
            };

            const generateNewTarget = () => {
                const min = Math.min(minProblemLength, maxProblemLength);
                const safeMax = Math.min(maxProblemLength, maxPossibleCmOnScreen);
                const max = Math.max(min, safeMax);
                const length = (Math.random() * (max - min) + min).toFixed(1);
                setTargetLengthCm(parseFloat(length));
                setStudentGuess(''); setTeacherGuess(''); setRoundResult(null);
                setGameState('play');
            };

            const startNewGame = () => { setCurrentRound(1); setGameHistory([]); generateNewTarget(); };

            const checkRoundGuess = () => {
                const sGuess = parseFloat(studentGuess); const tGuess = parseFloat(teacherGuess);
                if (isNaN(sGuess) || isNaN(tGuess)) return;
                const result = {
                    round: currentRound, actual: targetLengthCm,
                    student: { guess: sGuess, diff: Math.abs(sGuess - targetLengthCm) },
                    teacher: { guess: tGuess, diff: Math.abs(tGuess - targetLengthCm) }
                };
                setRoundResult(result); setGameHistory([...gameHistory, result]); setGameState('round_result');
            };

            const nextAction = () => {
                if (currentRound < MAX_ROUNDS) { setCurrentRound(prev => prev + 1); generateNewTarget(); }
                else setGameState('final_result');
            };

            const totals = gameHistory.reduce((acc, curr) => ({
                student: acc.student + curr.student.diff, teacher: acc.teacher + curr.teacher.diff
            }), { student: 0, teacher: 0 });

            return (
                <div className="min-h-screen bg-slate-50 flex flex-col items-center py-8 px-4 font-sans text-slate-800 transition-all">
                    {/* 오디오 엘리먼트 (숨김) */}
                    <audio ref={audioRef} src="bgm.mp3" loop />

                    <div className="max-w-[95vw] lg:max-w-6xl w-full bg-white rounded-3xl shadow-xl overflow-hidden border border-slate-200">
                        {/* 헤더 */}
                        <div className="bg-indigo-600 p-6 text-white flex justify-between items-center">
                            <div className="flex flex-col gap-1">
                                <h1 className="text-2xl font-bold flex items-center gap-2">
                                    <LucideIcon name="ruler" /> 정확한 길이 맞추기 대결
                                </h1>
                                {gameState !== 'calibrate' && <div className="text-[10px] bg-indigo-500/50 px-2 py-0.5 rounded-full inline-block w-fit">Round {currentRound} / {MAX_ROUNDS}</div>}
                            </div>
                            
                            {/* 음악 컨트롤 버튼 */}
                            <button onClick={toggleMusic} className={`p-3 rounded-full transition-all ${isMusicPlaying ? 'bg-yellow-400 text-indigo-900' : 'bg-indigo-500 text-white opacity-50'}`}>
                                <LucideIcon name={isMusicPlaying ? "music" : "music-2"} className={isMusicPlaying ? "music-rotating" : ""} />
                            </button>
                        </div>

                        <div className="p-4 sm:p-8" ref={containerRef}>
                            {/* 1단계: 설정 */}
                            {gameState === 'calibrate' && (
                                <div className="max-w-4xl mx-auto space-y-8 animate-in fade-in">
                                    <div className="flex flex-col items-center space-y-6">
                                        <div className="bg-slate-800 rounded-xl p-4 text-white border-2 border-slate-400" style={{ width: `${cardWidthPx}px`, height: `${cardWidthPx * 0.628}px` }}>
                                            <div className="w-8 h-6 bg-yellow-400 rounded"></div>
                                        </div>
                                        <div className="w-full max-w-lg space-y-6">
                                            <div className="bg-slate-50 p-4 rounded-xl border space-y-2">
                                                <label className="text-xs font-bold text-slate-500 uppercase">카드 너비 보정 (px)</label>
                                                <input type="range" min="50" max="800" value={cardWidthPx} onChange={(e) => setCardWidthPx(parseInt(e.target.value))} className="w-full accent-indigo-600" />
                                            </div>
                                            <div className="grid grid-cols-2 gap-4 bg-white p-4 rounded-xl border">
                                                <div className="col-span-2 text-xs font-bold text-slate-400 mb-2 border-b pb-1">문제 범위 및 화면 한계 ({maxPossibleCmOnScreen}cm)</div>
                                                <div className="space-y-1">
                                                    <label className="text-[10px] font-bold">최소 (cm)</label>
                                                    <input type="number" value={minProblemLength} onChange={(e) => setMinProblemLength(parseInt(e.target.value))} className="w-full border rounded p-2" />
                                                </div>
                                                <div className="space-y-1">
                                                    <label className="text-[10px] font-bold">최대 (cm)</label>
                                                    <input type="number" value={maxProblemLength} onChange={(e) => setMaxProblemLength(parseInt(e.target.value))} className="w-full border rounded p-2" />
                                                </div>
                                                {maxProblemLength > maxPossibleCmOnScreen && <p className="col-span-2 text-[10px] text-pink-500 font-bold">* 주의: 현재 화면 너비에 맞춰 자동 제한됩니다.</p>}
                                            </div>
                                        </div>
                                    </div>
                                    <button onClick={startNewGame} className="w-full py-4 bg-indigo-600 text-white font-bold rounded-xl shadow-lg">대결 시작!</button>
                                </div>
                            )}

                            {/* 2단계: 플레이 (가운데 정렬) */}
                            {gameState === 'play' && (
                                <div className="space-y-12 animate-in fade-in text-center">
                                    <div className="w-full py-24 px-4 bg-slate-50 rounded-3xl border-2 border-dashed flex items-center justify-center overflow-hidden">
                                        <div className="h-8 bg-indigo-600 rounded-full shadow-xl transition-all duration-300" style={{ width: `${targetLengthCm * pixelsPerCm}px` }}></div>
                                    </div>
                                    <div className="max-w-2xl mx-auto grid grid-cols-2 gap-4">
                                        <input type="number" step="0.1" value={studentGuess} onChange={(e) => setStudentGuess(e.target.value)} className="text-2xl font-black text-center py-4 border-2 rounded-2xl outline-none focus:border-indigo-500" placeholder="학생 cm" />
                                        <input type="number" step="0.1" value={teacherGuess} onChange={(e) => setTeacherGuess(e.target.value)} className="text-2xl font-black text-center py-4 border-2 rounded-2xl outline-none focus:border-pink-500" placeholder="교사 cm" />
                                        <button onClick={checkRoundGuess} className="col-span-2 py-4 bg-slate-800 text-white font-bold rounded-2xl">결과 확인</button>
                                    </div>
                                </div>
                            )}

                            {/* 3단계: 결과 및 4단계: 최종 결과 생략 (기존과 동일하게 유지됨) */}
                            {(gameState === 'round_result' || gameState === 'final_result') && (
                                <div className="text-center space-y-6 animate-in zoom-in">
                                    {gameState === 'round_result' ? (
                                        <>
                                            <div className="text-5xl font-black text-yellow-500 mb-4">{targetLengthCm} cm</div>
                                            <div className="grid grid-cols-2 gap-4 max-w-md mx-auto">
                                                <div className="p-4 bg-indigo-50 rounded-xl"><div className="text-xs opacity-50">학생</div><div className="font-bold">{studentGuess}</div></div>
                                                <div className="p-4 bg-pink-50 rounded-xl"><div className="text-xs opacity-50">교사</div><div className="font-bold">{teacherGuess}</div></div>
                                            </div>
                                            <button onClick={nextAction} className="w-full max-w-md py-4 bg-indigo-600 text-white font-bold rounded-xl">{currentRound < MAX_ROUNDS ? "다음 라운드" : "최종 결과"}</button>
                                        </>
                                    ) : (
                                        <div className="space-y-8">
                                            <h2 className="text-4xl font-black">최종 승자: {totals.student < totals.teacher ? "학생 팀! 🎉" : "선생님! 👑"}</h2>
                                            <div className="flex gap-4">
                                                <button onClick={startNewGame} className="flex-1 py-4 bg-indigo-600 text-white font-bold rounded-xl">다시 시작</button>
                                                <button onClick={() => setGameState('calibrate')} className="px-6 py-4 bg-slate-100 font-bold rounded-xl text-slate-500">설정 변경</button>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
